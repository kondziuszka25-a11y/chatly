version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: messenger-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: messenger_db
      MYSQL_USER: messenger_user
      MYSQL_PASSWORD: messenger_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
